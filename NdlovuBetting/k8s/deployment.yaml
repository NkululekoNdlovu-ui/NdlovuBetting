apiVersion: v1
kind: Namespace
metadata:
  name: ndlovubetting
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndlovubetting
  labels:
    app: ndlovubetting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ndlovubetting
  template:
    metadata:
      labels:
        app: ndlovubetting
    spec:
      containers:
      - name: ndlovubetting
        image: quay.io/nkulu/ndlovubetting:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          value: "Server=mssql-service,1433;Database=NdlovuBettingDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;Encrypt=true;"
---
apiVersion: v1
kind: Service
metadata:
  name: ndlovubetting-service
spec:
  type: LoadBalancer
  selector:
    app: ndlovubetting
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
