apiVersion: v1
kind: Namespace
metadata:
  name: ndlovubetting
---
# Secret for MSSQL SA password
apiVersion: v1
kind: Secret
metadata:
  name: mssql-sa-password
  namespace: ndlovubetting
type: Opaque
stringData:
  saPassword: "@MaBhiza2010"
---
# Persistent Volume Claim for MSSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-pvc
  namespace: ndlovubetting
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: oci-bv  # Oracle Cloud default storage class
  resources:
    requests:
      storage: 10Gi
---
# MSSQL StatefulSet (better for databases than Deployment)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mssql
  namespace: ndlovubetting
spec:
  serviceName: mssql-service
  replicas: 1
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
    spec:
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
        - containerPort: 1433
          name: mssql
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql-sa-password
              key: saPassword
        - name: MSSQL_PID
          value: "Developer"  # Free Developer edition
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: mssql-storage
          mountPath: /var/opt/mssql
        livenessProbe:
          exec:
            command:
              - /bin/bash
              - -c
              - /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -Q "SELECT 1" || exit 1
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
              - /bin/bash
              - -c
              - /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -Q "SELECT 1" || exit 1
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: mssql-storage
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: oci-bv
      resources:
        requests:
          storage: 10Gi
---
# Service for MSSQL (ClusterIP - internal only)
apiVersion: v1
kind: Service
metadata:
  name: mssql-service
  namespace: ndlovubetting
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: mssql
  ports:
  - port: 1433
    targetPort: 1433
    name: mssql
---
# Updated NdlovuBetting Deployment (with corrected connection string)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndlovubetting
  namespace: ndlovubetting
  labels:
    app: ndlovubetting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ndlovubetting
  template:
    metadata:
      labels:
        app: ndlovubetting
    spec:
      # Wait for MSSQL to be ready before starting the app
      initContainers:
      - name: wait-for-mssql
        image: busybox
        command: ['sh', '-c', "until nc -z mssql-service 1433; do echo waiting for mssql; sleep 2; done"]
      containers:
      - name: ndlovubetting
        image: quay.io/nkulu/ndlovubetting:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"  # Switch to Production once stable
        - name: ConnectionStrings__DefaultConnection
          value: "Server=mssql-service,1433;Database=NdlovuBettingDb;User Id=sa;Password=@MaBhiza2010;TrustServerCertificate=true;Encrypt=true;Connection Timeout=30;"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
---
# LoadBalancer Service for the app (already exists, but included for completeness)
apiVersion: v1
kind: Service
metadata:
  name: ndlovubetting-service
  namespace: ndlovubetting
spec:
  type: LoadBalancer
  selector:
    app: ndlovubetting
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
