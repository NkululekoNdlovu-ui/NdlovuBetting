apiVersion: v1
kind: Namespace
metadata:
  name: ndlovubetting
---
# Secret for MSSQL SA password
apiVersion: v1
kind: Secret
metadata:
  name: mssql-sa-password
  namespace: ndlovubetting
type: Opaque
stringData:
  saPassword: "@MaBhiza2010"
---
# MSSQL Deployment (simpler, using emptyDir)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql
  namespace: ndlovubetting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
    spec:
      securityContext:
        fsGroup: 10001
        runAsNonRoot: false  # MSSQL needs root in container
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
        - containerPort: 1433
          name: mssql
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql-sa-password
              key: saPassword
        - name: MSSQL_PID
          value: "Developer"
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        volumeMounts:
        - name: mssql-storage
          mountPath: /var/opt/mssql
      volumes:
      - name: mssql-storage
        emptyDir:
          sizeLimit: 10Gi
---
# Service for MSSQL
apiVersion: v1
kind: Service
metadata:
  name: mssql-service
  namespace: ndlovubetting
spec:
  type: ClusterIP
  selector:
    app: mssql
  ports:
  - port: 1433
    targetPort: 1433
    name: mssql
---
# NdlovuBetting App Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndlovubetting
  namespace: ndlovubetting
  labels:
    app: ndlovubetting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ndlovubetting
  template:
    metadata:
      labels:
        app: ndlovubetting
    spec:
      initContainers:
      - name: wait-for-mssql
        image: busybox
        command: ['sh', '-c', "until nc -z mssql-service 1433; do echo waiting for mssql; sleep 2; done"]
      containers:
      - name: ndlovubetting
        image: quay.io/nkulu/ndlovubetting:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          value: "Server=mssql-service,1433;Database=NdlovuBettingDb;User Id=sa;Password=@MaBhiza2010;TrustServerCertificate=true;Encrypt=false;Connection Timeout=30;"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
---
# LoadBalancer Service for the app
apiVersion: v1
kind: Service
metadata:
  name: ndlovubetting-service
  namespace: ndlovubetting
spec:
  type: LoadBalancer
  selector:
    app: ndlovubetting
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

