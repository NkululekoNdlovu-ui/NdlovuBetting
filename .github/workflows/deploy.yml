name: Build and Push Docker Image
on:
  push:
    branches: [ master ]
    paths:
      - 'NdlovuBetting/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to OCIR
        uses: docker/login-action@v2
        with:
          registry: ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./NdlovuBetting
          push: true
          tags: |
            ocir.io/af-johannesburg-1/nkulufr98/ndlovubetting:latest
            ocir.io/af-johannesburg-1/nkulufr98/ndlovubetting:${{ github.sha }}
